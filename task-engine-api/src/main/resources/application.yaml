spring:
  # DataSource: Using PostgreSQL database
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # JPA (Java Persistence API): The bridge between Java Objects and SQL Tables
  jpa:
    hibernate:
      # ddl-auto: 'update' updates existing schema without dropping tables
      ddl-auto: update
      
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    # show-sql: Prints every SQL query (SELECT, INSERT, etc.) to your IntelliJ console
    show-sql: false

    properties:
      hibernate:
        # format_sql: Makes the printed SQL look pretty and readable (multiline)
        format_sql: true
        # dialect: Tells Hibernate exactly which version of SQL rules to follow
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Spring Security: Default credentials for development
  security:
    user:
      name: admin
      password: admin123

# Server: Change the port if 8080 is busy, but we'll stick to 8080
server:
  port: 8080